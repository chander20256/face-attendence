<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Face Attendance System</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
  
  </style>
</head>

<body class="bg-gray-50">
  <!-- Main App Container -->
  <div id="app" class="min-h-screen">
    <div class="flex items-center justify-center min-h-screen">
      <div class="text-gray-500 text-sm animate-pulse">Loading...</div>
    </div>
  </div>

  <script>
    const ROUTES = {
      home: { path: '/', file: 'pages/landing.html' },
      register: { path: '/register', file: 'pages/register.html' },
      attendance: { path: '/attendance', file: 'pages/attendance.html' }
    };

    function routeFromLocation() {
      const path = window.location.pathname.replace(/\/+$/, '') || '/';
      if (path === '/register' || path === '/register.html') return 'register';
      if (path === '/attendance' || path === '/attendance.html') return 'attendance';
      return 'home';
    }

    function navigate(page, replace = false) {
      const route = ROUTES[page] || ROUTES.home;
      loadComponent("app", route.file);
      if (window.location.pathname !== route.path) {
        const method = replace ? 'replaceState' : 'pushState';
        window.history[method]({ page }, '', route.path);
      }
      window.scrollTo(0, 0);
    }

    // Load component dynamically
    function loadComponent(elementId, filePath) {
      const el = document.getElementById(elementId);
      if (el) {
        el.innerHTML = '<div class="flex items-center justify-center min-h-screen"><div class="text-gray-500 text-sm animate-pulse">Loading...</div></div>';
      }
      
      fetch(filePath)
        .then(res => {
          if (!res.ok) throw new Error(`Failed to load ${filePath}`);
          return res.text();
        })
        .then(data => {
          if (el) {
            el.innerHTML = data;
            // Re-attach any scripts in the loaded content
            const scripts = el.querySelectorAll('script');
            scripts.forEach(oldScript => {
              const newScript = document.createElement('script');
              if (oldScript.src) {
                newScript.src = oldScript.src;
              } else {
                newScript.textContent = oldScript.textContent;
              }
              document.body.appendChild(newScript);
              oldScript.remove();
            });
          }
        })
        .catch(err => {
          if (el) {
            el.innerHTML = `
              <div class="flex items-center justify-center min-h-screen">
                <div class="text-red-500 text-center py-10">
                  <p class="text-lg font-semibold">Error Loading Page</p>
                  <p class="text-sm">${err.message}</p>
                  <button onclick="navigate('home', true)" 
                          class="mt-4 px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700">
                    Go to Home
                  </button>
                </div>
              </div>
            `;
          }
        });
    }

    window.addEventListener('popstate', () => {
      navigate(routeFromLocation(), true);
    });

    navigate(routeFromLocation(), true);
  </script>
</body>
</html>
